{% extends "base.html" %}

{% block title %}Create Parking Lot - Vehicle Parking App{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-plus"></i> Create New Parking Lot</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Location Name:</label>
                        <input type="text" class="form-control" id="name" name="name" required 
                               placeholder="e.g., Mall Road Parking">
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Address:</label>
                        <textarea class="form-control" id="address" name="address" rows="3" required 
                                  placeholder="Enter full address"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="pin_code" class="form-label">PIN Code:</label>
                            <input type="text" class="form-control" id="pin_code" name="pin_code" required 
                                   pattern="[0-9]{6}" placeholder="123456">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="price" class="form-label">Price per Hour (₹):</label>
                            <input type="number" class="form-control" id="price" name="price" required 
                                   min="1" step="0.01" placeholder="50.00">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="max_spots" class="form-label">Number of Spots:</label>
                            <input type="number" class="form-control" id="max_spots" name="max_spots" required 
                                   min="1" max="500" placeholder="50">
                        </div>
                    </div>
                    
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle"></i>
                        <strong>Note:</strong> Parking spots will be automatically created and numbered (S001, S002, etc.) 
                        based on the number you specify.
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-plus"></i> Create Parking Lot
                        </button>
                        <a href="{{ url_for('admin.parking_lots') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
